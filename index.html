<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyView Calibrador Pro</title>
    <style>
        body { margin: 0; background: #020617; color: #f8fafc; font-family: system-ui; overflow: hidden; text-align: center; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(2, 6, 23, 0.9); z-index: 10; padding: 20px; transition: 0.5s; }
        .instruccion { margin-bottom: 20px; font-size: 1.2rem; }
        .flecha { font-size: 4rem; margin: 20px; animation: bounce 1s infinite; }
        button { background: #38bdf8; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        #debug { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 10px; text-align: left; pointer-events: none; opacity: 0.7; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug">A: 0 | B: 0 | G: 0</div>

<div id="ui">
    <div id="step-content">
        <h1>Calibración de Bóveda</h1>
        <p class="instruccion">Primero, pon el móvil plano y gíralo a la izquierda.</p>
        <div class="flecha">⬅️</div>
        <button onclick="proximoPaso()">Siguiente</button>
    </div>
</div>

<canvas id="skyCanvas"></canvas>

<script>
    const canvas = document.getElementById('skyCanvas');
    const ctx = canvas.getContext('2d');
    const debug = document.getElementById('debug');
    const ui = document.getElementById('ui');
    const stepContent = document.getElementById('step-content');

    let step = 0;
    let sensors = { a: 0, b: 0, g: 0 };
    let offset = { a: 0, b: 0, g: 0 };
    let active = false;

    const pasos = [
        { txt: "Gira el móvil a la IZQUIERDA (plano)", icon: "⬅️" },
        { txt: "Gira el móvil a la DERECHA (plano)", icon: "➡️" },
        { txt: "Levanta el móvil hacia el CIELO (Cénit)", icon: "⬆️" },
        { txt: "Gira sobre su eje lateral", icon: "🔄" }
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    async function proximoPaso() {
        if (step === 0) {
            // Solicitar permisos en iOS
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const resp = await DeviceOrientationEvent.requestPermission();
                if (resp !== 'granted') return alert("Permiso denegado");
            }
            window.addEventListener('deviceorientation', e => {
                sensors.a = e.alpha || 0;
                sensors.b = e.beta || 0;
                sensors.g = e.gamma || 0;
                debug.innerText = `A: ${sensors.a.toFixed(1)} B: ${sensors.b.toFixed(1)} G: ${sensors.g.toFixed(1)}`;
            });
        }

        if (step < pasos.length) {
            const p = pasos[step];
            stepContent.innerHTML = `<h1>Paso ${step + 1}</h1><p class="instruccion">${p.txt}</p><div class="flecha">${p.icon}</div><button onclick="proximoPaso()">Siguiente</button>`;
            step++;
        } else {
            // Calibrar: Guardamos la posición actual como referencia
            offset.a = sensors.a;
            offset.b = sensors.b; 
            ui.classList.add('hidden');
            active = true;
            render();
        }
    }

    function render() {
        if (!active) return;

        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- LÓGICA DE MOVIMIENTO ---
        // Alpha es el giro horizontal (brújula)
        let deltaA = sensors.a - offset.a;
        if (deltaA > 180) deltaA -= 360;
        if (deltaA < -180) deltaA += 360;

        // Beta es la inclinación vertical (mirar arriba/abajo)
        // Usamos la diferencia con respecto a la inclinación de calibración
        let deltaB = sensors.b - offset.b;

        // Mapeo de coordenadas al centro de la pantalla
        // Sensibilidad: 15px por grado
        const sens = 15;
        let x = (canvas.width / 2) - (deltaA * sens);
        let y = (canvas.height / 2) - (deltaB * sens);

        // Dibujar Cénit (Guía visual)
        ctx.strokeStyle = '#38bdf8';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(x, y, 50, 0, Math.PI * 2);
        ctx.stroke();

        // Dibujar "Estrella"
        ctx.setLineDash([]);
        ctx.fillStyle = '#f8fafc';
        ctx.beginPath();
        ctx.arc(x, y, 10, 0, Math.PI * 2);
        ctx.fill();

        // Etiqueta
        ctx.font = "bold 16px sans-serif";
        ctx.fillText("OBJETO CELESTE", x + 15, y + 5);

        requestAnimationFrame(render);
    }
</script>
</body>
</html>
