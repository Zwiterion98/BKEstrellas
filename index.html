<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyView Web Clone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); z-index: 10; padding: 20px; transition: opacity 0.5s; }
        h1 { color: #4fc3f7; }
        .instruccion { font-size: 1.2rem; margin: 20px 0; max-width: 300px; }
        .icono { font-size: 5rem; margin-bottom: 30px; animation: flotar 2s ease-in-out infinite; }
        button { background: #4fc3f7; color: #000; border: none; padding: 15px 40px; font-size: 1.1rem; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 5; pointer-events: none; }
        .crosshair::after { content: ''; position: absolute; top: 9px; left: -5px; width: 30px; height: 2px; background: rgba(255,255,255,0.3); }
        .crosshair::before { content: ''; position: absolute; top: -5px; left: 9px; width: 2px; height: 30px; background: rgba(255,255,255,0.3); }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .oculto { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="crosshair" id="mira" style="display: none;"></div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="step-content">
            <h1>Calibrador Espacial</h1>
            <p class="instruccion">Alinearemos los sensores de tu dispositivo con la bóveda celeste.</p>
            <button onclick="iniciarCalibracion()">Comenzar</button>
        </div>
    </div>

<script>
    // --- VARIABLES DE INTERFAZ ---
    const uiLayer = document.getElementById('ui-layer');
    const stepContent = document.getElementById('step-content');
    const mira = document.getElementById('mira');
    let pasoActual = 0;
    
    // El offset nos permite definir qué es "Adelante" según la posición en la que el usuario inicia
    let alphaOffset = 0; 
    let eventoSensoresActual = null;

    const pasos = [
        { txt: "1. Mantén el celular plano y gíralo 90° a tu IZQUIERDA.", icon: "⬅️" },
        { txt: "2. Ahora gíralo 180° a tu DERECHA.", icon: "➡️" },
        { txt: "3. Levanta el celular apuntando la cámara hacia el CIELO (Cénit).", icon: "⬆️" },
        { txt: "4. Gira el celular sobre su eje como un volante.", icon: "🔄" }
    ];

    // --- CONFIGURACIÓN DE THREE.JS (La Bóveda Celeste 3D) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // 1. Crear Estrellas Aleatorias en una esfera gigante
    const starGeometry = new THREE.BufferGeometry();
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 });
    const starVertices = [];
    for (let i = 0; i < 2000; i++) {
        // Coordenadas esféricas aleatorias
        const theta = 2 * Math.PI * Math.random();
        const phi = Math.acos(2 * Math.random() - 1);
        const radio = 500;
        const x = radio * Math.sin(phi) * Math.cos(theta);
        const y = radio * Math.sin(phi) * Math.sin(theta);
        const z = radio * Math.cos(phi);
        starVertices.push(x, y, z);
    }
    starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // 2. Función para agregar textos flotantes (Puntos Cardinales y Cénit)
    function crearEtiqueta(texto, x, y, z, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 128;
        const context = canvas.getContext('2d');
        context.font = "Bold 40px Arial";
        context.fillStyle = color;
        context.textAlign = "center";
        context.fillText(texto, 128, 64);
        
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.position.set(x, y, z);
        sprite.scale.set(50, 25, 1);
        scene.add(sprite);
    }

    // Agregar referencias visuales a 100 unidades de distancia
    crearEtiqueta("Norte (Tu Inicio)", 0, 0, -100, "#4fc3f7");
    crearEtiqueta("Sur", 0, 0, 100, "#ff7043");
    crearEtiqueta("Este", 100, 0, 0, "#fff");
    crearEtiqueta("Oeste", -100, 0, 0, "#fff");
    crearEtiqueta("⭐ CÉNIT (Arriba) ⭐", 0, 100, 0, "#ffee58"); // Punto más alto
    crearEtiqueta("Nadir (Abajo)", 0, -100, 0, "#888");       // Punto más bajo

    // --- LÓGICA DE CALIBRACIÓN Y SENSORES ---
    async function iniciarCalibracion() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const permiso = await DeviceOrientationEvent.requestPermission();
            if (permiso !== 'granted') return alert("Necesitamos acceso a los sensores.");
        }
        
        // Escuchar los sensores
        window.addEventListener('deviceorientation', (e) => {
            eventoSensoresActual = e;
        });

        avanzarPaso();
    }

    function avanzarPaso() {
        if (pasoActual < pasos.length) {
            const p = pasos[pasoActual];
            stepContent.innerHTML = `
                <div class="icono">${p.icon}</div>
                <p class="instruccion">${p.txt}</p>
                <button onclick="avanzarPaso()">Siguiente</button>
            `;
            pasoActual++;
        } else {
            // CALIBRACIÓN FINAL: Guardamos hacia dónde mira el usuario para que ese sea el "Norte/Frente"
            if (eventoSensoresActual && eventoSensoresActual.alpha !== null) {
                alphaOffset = eventoSensoresActual.alpha;
            }
            uiLayer.classList.add('oculto');
            mira.style.display = 'block';
        }
    }

    // --- EL CEREBRO DE LA ROTACIÓN (Cálculo de Cuaterniones) ---
    // Esta función traduce el giroscopio a movimiento 3D sin el error de "Gimbal Lock"
    function actualizarCamara() {
        if (!eventoSensoresActual || eventoSensoresActual.alpha === null) return;

        // 1. Obtener grados de los sensores
        let alpha = eventoSensoresActual.alpha ? THREE.MathUtils.degToRad(eventoSensoresActual.alpha - alphaOffset) : 0;
        let beta = eventoSensoresActual.beta ? THREE.MathUtils.degToRad(eventoSensoresActual.beta) : 0;
        let gamma = eventoSensoresActual.gamma ? THREE.MathUtils.degToRad(eventoSensoresActual.gamma) : 0;
        let orientacionPantalla = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

        // 2. Orden de rotación YXZ específico para móviles
        const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
        const qDispositivo = new THREE.Quaternion().setFromEuler(euler);

        // 3. Ajustar la cámara para que mire hacia adelante (Z negativo) y compensar la rotación del hardware
        const qAjuste = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90 grados en X
        qDispositivo.multiply(qAjuste);

        // 4. Compensar si el usuario pone el celular en horizontal (Landscape)
        const qPantalla = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -orientacionPantalla);
        qDispositivo.multiply(qPantalla);

        // Aplicar la rotación final a la cámara
        camera.quaternion.copy(qDispositivo);
    }

    // --- BUCLE DE RENDERIZADO ---
    function animar() {
        requestAnimationFrame(animar);
        actualizarCamara();
        renderer.render(scene, camera);
    }
    animar();

    // Reajustar tamaño si se voltea el celular
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
