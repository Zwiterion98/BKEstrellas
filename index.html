<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyView: GPS + Brújula Automática</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0c10; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(11, 12, 16, 0.95); z-index: 10; padding: 20px; transition: opacity 0.5s; }
        h1 { color: #66fcf1; }
        .instruccion { font-size: 1.1rem; margin: 20px 0; max-width: 320px; color: #c5c6c7; line-height: 1.5; }
        button { background: #45a29e; color: #fff; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(69, 162, 158, 0.4); }
        button:active { transform: scale(0.95); }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid rgba(102,252,241,0.5); border-radius: 50%; z-index: 5; }
        .oculto { opacity: 0; pointer-events: none; }
        #info-panel { position: absolute; bottom: 20px; left: 20px; text-align: left; z-index: 5; font-size: 12px; color: #66fcf1; pointer-events: none; text-shadow: 1px 1px 2px black; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="crosshair" id="mira" style="display: none;"></div>
    <div id="canvas-container"></div>
    <div id="info-panel" class="oculto">
        <span id="txt-gps">Buscando GPS...</span><br>
        <span id="txt-brujula">Brújula: Desconectada</span>
    </div>

    <div id="ui-layer">
        <div id="step-content">
            <h1>Sincronización Total</h1>
            <p class="instruccion">Permite el acceso a tu Ubicación (GPS) y Sensores de Movimiento para alinear automáticamente la bóveda celeste.</p>
            <button onclick="iniciarApp()">Conectar con el Cielo</button>
        </div>
    </div>

<script>
    let scene, camera, renderer, starGroup;
    const uiLayer = document.getElementById('ui-layer');
    const panelGPS = document.getElementById('txt-gps');
    const panelBrujula = document.getElementById('txt-brujula');
    
    let usuarioLat = 0, usuarioLon = 0;
    let brujulaDetectada = false;
    let headingOffset = 0; // Guardará la desviación del Norte
    let currentAlpha = 0, currentBeta = 0, currentGamma = 0;
    
    const planetas = ['Sun', 'Moon', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
    const coloresPlanetas = { 'Sun': 0xffdd00, 'Moon': 0xffffff, 'Venus': 0xffd700, 'Mars': 0xff4400, 'Jupiter': 0xffaa66, 'Saturn': 0xeedd88 };

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        starGroup = new THREE.Group();
        scene.add(starGroup);

        crearEtiqueta("Norte", 0, 0, -500, "#66fcf1");
        crearEtiqueta("Sur", 0, 0, 500, "#ff7043");
        crearEtiqueta("Este", 500, 0, 0, "#ffffff");
        crearEtiqueta("Oeste", -500, 0, 0, "#ffffff");
        
        animar();
    }

    function azAltToVector(azimuth, altitude, radius = 500) {
        const azRad = THREE.MathUtils.degToRad(azimuth);
        const altRad = THREE.MathUtils.degToRad(altitude);
        return new THREE.Vector3(
            radius * Math.cos(altRad) * Math.sin(azRad),
            radius * Math.sin(altRad),
            -radius * Math.cos(altRad) * Math.cos(azRad)
        );
    }

    function generarCieloReal() {
        const fechaActual = new Date();
        const observador = new Astronomy.Observer(usuarioLat, usuarioLon, 0);

        planetas.forEach(cuerpo => {
            const equ_2000 = Astronomy.Equator(cuerpo, fechaActual, observador, true, true);
            const horizonte = Astronomy.Horizon(fechaActual, observador, equ_2000.ra, equ_2000.dec, 'normal');
            const pos = azAltToVector(horizonte.azimuth, horizonte.altitude);
            
            const size = (cuerpo === 'Sun' || cuerpo === 'Moon') ? 15 : 6;
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 32, 32), new THREE.MeshBasicMaterial({ color: coloresPlanetas[cuerpo] }));
            mesh.position.copy(pos);
            starGroup.add(mesh);
            crearEtiqueta(cuerpo === 'Sun' ? 'Sol' : cuerpo === 'Moon' ? 'Luna' : cuerpo, pos.x, pos.y - 20, pos.z, coloresPlanetas[cuerpo], 20);
        });

        // Estrellas de fondo
        const starGeo = new THREE.BufferGeometry();
        const starVerts = [];
        for (let i = 0; i < 800; i++) {
            const rPos = azAltToVector(Math.random() * 360, (Math.random() * 180) - 90, 800);
            starVerts.push(rPos.x, rPos.y, rPos.z);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
        starGroup.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x888888, size: 1.5 })));
    }

    function crearEtiqueta(texto, x, y, z, color, textSize = 30) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = `Bold ${textSize}px sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(texto, 128, 64);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
        sprite.position.set(x, y, z);
        sprite.scale.set(80, 40, 1);
        scene.add(sprite);
    }

    // --- LA MAGIA DE LA BRÚJULA AUTOMÁTICA ---
    function procesarSensores(e) {
        if (e.alpha === null) return;

        currentAlpha = e.alpha;
        currentBeta = e.beta;
        currentGamma = e.gamma;

        // Si es iOS, tiene webkitCompassHeading
        if (e.webkitCompassHeading !== undefined) {
            headingOffset = e.webkitCompassHeading;
            brujulaDetectada = true;
            panelBrujula.innerText = `Brújula (iOS): ${headingOffset.toFixed(0)}° Norte`;
        } 
        // Si es Android, usamos la orientación absoluta si está disponible
        else if (e.absolute || e.alpha !== null) {
            // En Android, Alpha = 360 - brújula
            headingOffset = 360 - e.alpha;
            brujulaDetectada = true;
            panelBrujula.innerText = `Brújula (Andr): ${headingOffset.toFixed(0)}° Norte`;
        }
    }

    async function iniciarApp() {
        document.getElementById('step-content').innerHTML = `<h2 style="color:#66fcf1;">Calculando...</h2>`;
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            usuarioLat = pos.coords.latitude;
            usuarioLon = pos.coords.longitude;
            panelGPS.innerText = `GPS: Lat ${usuarioLat.toFixed(1)} / Lon ${usuarioLon.toFixed(1)}`;
            document.getElementById('info-panel').classList.remove('oculto');

            generarCieloReal();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permiso = await DeviceOrientationEvent.requestPermission();
                if (permiso !== 'granted') return alert("Necesitamos sensores para orientarte.");
            }
            
            // Intentamos obtener el sensor absoluto para Android
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', procesarSensores);
            } else {
                // Fallback para iOS y navegadores estándar
                window.addEventListener('deviceorientation', procesarSensores);
            }

            // Ocultar UI y empezar
            setTimeout(() => {
                uiLayer.classList.add('oculto');
                document.getElementById('mira').style.display = 'block';
            }, 1000);

        }, (err) => alert("Error GPS: " + err.message));
    }

    // --- CÁMARA ACTUALIZADA CON BRÚJULA ---
    function actualizarCamara() {
        if (!brujulaDetectada) return;

        // Combinamos la rotación del usuario (Alpha) con el Offset detectado por la brújula
        let alphaRad = THREE.MathUtils.degToRad(currentAlpha);
        
        // Si detectamos el norte, forzamos que Alpha mire en esa dirección
        if (headingOffset !== 0) {
           alphaRad = THREE.MathUtils.degToRad(360 - headingOffset);
        }

        let betaRad = THREE.MathUtils.degToRad(currentBeta);
        let gammaRad = THREE.MathUtils.degToRad(currentGamma);
        let screenRot = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

        const euler = new THREE.Euler(betaRad, alphaRad, -gammaRad, 'YXZ');
        const qDispositivo = new THREE.Quaternion().setFromEuler(euler);
        qDispositivo.multiply(new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)));
        qDispositivo.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -screenRot));
        
        camera.quaternion.copy(qDispositivo);
    }

    function animar() {
        requestAnimationFrame(animar);
        actualizarCamara();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init3D();
</script>
</body>
</html>
